name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x86_64
          - runner: macos-14
            target: darwin-x86_64
          - runner: macos-14
            target: darwin-aarch64
          - runner: windows-latest
            target: windows-x86_64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install SQLite (Windows)
        if: runner.os == 'Windows'
        run: choco install sqlite --no-progress -y

      - name: Set SQLITE3_LIB_DIR (Windows)
        if: runner.os == 'Windows'
        run: echo "SQLITE3_LIB_DIR=C:\ProgramData\chocolatey\lib\SQLite\tools" >> $env:GITHUB_ENV
        shell: pwsh

      - run: npm ci

      - name: Build Tauri (${{ matrix.target }})
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # macOS updater artifacts (DeskSpawn.app.tar.gz + .sig) have no arch in name,
      # causing collisions between darwin-x86_64 and darwin-aarch64 builds.
      # Rename them to include the target before uploading.
      - name: Rename macOS updater artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/macos
          for src in DeskSpawn.app.tar.gz DeskSpawn.app.tar.gz.sig; do
            if [ -f "$src" ]; then
              dst="DeskSpawn_${{ matrix.target }}.app.tar.gz${src#DeskSpawn.app.tar.gz}"
              mv "$src" "$dst"
              echo "Renamed $src -> $dst"
            fi
          done

      - name: Upload release assets
        shell: bash
        run: |
          # Upload all bundle outputs: installers + updater artifacts + signatures
          # deb: Linux .deb packages
          ls src-tauri/target/release/bundle/deb/*.deb 2>/dev/null && \
            gh release upload "${{ github.ref_name }}" src-tauri/target/release/bundle/deb/*.deb --clobber || true
          # AppImage: Linux portable
          ls src-tauri/target/release/bundle/appimage/*.AppImage* 2>/dev/null && \
            gh release upload "${{ github.ref_name }}" src-tauri/target/release/bundle/appimage/*.AppImage* --clobber || true
          # dmg: macOS disk image
          ls src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null && \
            gh release upload "${{ github.ref_name }}" src-tauri/target/release/bundle/dmg/*.dmg --clobber || true
          # msi: Windows installer
          ls src-tauri/target/release/bundle/msi/*.msi 2>/dev/null && \
            gh release upload "${{ github.ref_name }}" src-tauri/target/release/bundle/msi/*.msi --clobber || true
          # Updater artifacts + signatures (tar.gz, nsis.zip, .sig files)
          find src-tauri/target/release/bundle -type f \( -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.sig" \) 2>/dev/null | while read f; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
        env:
          GH_TOKEN: ${{ github.token }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        run: |
          gh release download "${{ github.ref_name }}" --dir release-assets
          ls -la release-assets/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate updates.json
        run: |
          cat > /tmp/generate-updates.js << 'EOF'
          const fs = require("fs");
          const path = require("path");

          const repo = process.env.REPO;
          const tag = process.env.TAG;
          const version = tag.replace(/^v/, "");
          const baseUrl = "https://github.com/" + repo + "/releases/download/" + tag;
          const assetsDir = "release-assets";
          const platforms = {};
          const targetOrder = [
            "darwin-aarch64", "darwin-x86_64",
            "linux-x86_64",
            "windows-x86_64"
          ];

          if (!fs.existsSync(assetsDir)) {
            console.log("No release assets found, skipping updates.json generation.");
            const empty = {
              version: version,
              notes: "No update artifacts available.",
              pub_date: new Date().toISOString(),
              platforms: {}
            };
            fs.writeFileSync("website/public/updates.json", JSON.stringify(empty, null, 2));
            process.exit(0);
          }

          const files = fs.readdirSync(assetsDir);

          // Helper: determine target from Tauri updater .sig filename
          function detectTarget(name) {
            const lower = name.toLowerCase();
            if (lower.includes("darwin-aarch64")) return "darwin-aarch64";
            if (lower.includes("darwin-x86_64")) return "darwin-x86_64";
            if (lower.includes("amd64") && (lower.includes("appimage") || lower.includes(".deb"))) return "linux-x86_64";
            if ((lower.includes(".msi") || lower.includes("nsis")) && lower.includes("x64")) return "windows-x86_64";
            return null;
          }

          const sigFiles = files.filter(function(f) { return f.endsWith(".sig"); });
          console.log("Found .sig files:", sigFiles);

          sigFiles.forEach(function(sigFile) {
            const sigContent = fs.readFileSync(path.join(assetsDir, sigFile), "utf8").trim();
            const bundleName = sigFile.replace(/\.sig$/, "");
            const target = detectTarget(sigFile);

            if (target) {
              const bundleExists = files.includes(bundleName);
              const url = baseUrl + "/" + encodeURIComponent(bundleExists ? bundleName : sigFile.replace(/\.sig$/, ""));
              platforms[target] = {
                signature: sigContent,
                url: url
              };
              console.log("  " + target + ": " + bundleName + " (exists: " + bundleExists + ")");
            } else {
              console.log("  SKIPPED (unknown target): " + sigFile);
            }
          });

          var sorted = {};
          targetOrder.forEach(function(t) { if (platforms[t]) sorted[t] = platforms[t]; });
          Object.keys(platforms).forEach(function(k) { if (!sorted[k]) sorted[k] = platforms[k]; });

          var manifest = {
            version: version,
            notes: "See [GitHub Releases](https://github.com/" + repo + "/releases/tag/" + tag + ") for details.",
            pub_date: new Date().toISOString(),
            platforms: sorted
          };

          var jsonStr = JSON.stringify(manifest, null, 2);
          console.log("\nGenerated updates.json:");
          console.log(jsonStr);

          fs.mkdirSync("website/public", { recursive: true });
          fs.writeFileSync("website/public/updates.json", jsonStr);
          EOF
          node /tmp/generate-updates.js
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build website
        run: npm run build
        working-directory: website

      - name: Verify updates.json in dist
        run: |
          if [ -f website/dist/updates.json ]; then
            echo "updates.json found in dist:"
            cat website/dist/updates.json
          else
            echo "WARNING: updates.json not found in website/dist/"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
