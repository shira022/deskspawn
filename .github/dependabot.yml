version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      non-major:
        update-types:
          - "minor"
          - "patch"
